<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scrumbler, une partie en 25 secondes</title>

<!-- Design system tokens (couleurs, gradients reveal, radii, typo, shadows).
     Source : /public/brand/tokens/tokens.css, généré depuis le DS Scrumbler. -->
<link rel="stylesheet" href="/brand/tokens/tokens.css" />

<style>
  /* Ce fichier hérite intégralement de tokens.css.
     Aucun hex codé en dur : toutes les couleurs / gradients / radii / shadows
     passent par les --color-* / --gradient-* / --radius-* / --shadow-* du DS.
     Voir BRAND.md §2 et DESIGN_SYSTEM.md. */

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--color-bg-page);font-family:var(--font-primary);color:var(--color-text-primary);overflow:hidden}

  .stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .deco{position:absolute;pointer-events:none;border-radius:60% 40% 50% 50% / 50% 60% 40% 50%;opacity:.18;filter:blur(2px)}
  .deco-ring{position:absolute;border-radius:50%;border:10px solid currentColor;opacity:.18;pointer-events:none}

  .scene{
    position:relative;
    width:min(960px, 92vw);
    height:min(580px, 80vh);
    background:var(--color-bg-surface);
    border-radius:var(--radius-2xl);
    box-shadow:var(--shadow-lg), var(--shadow-card);
    border:1px solid var(--color-border);
    padding:var(--space-6) var(--space-8);
    overflow:hidden;
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    gap:var(--space-5);
  }

  /* ── Header ── */
  .scene-head{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
  .badge-room{display:inline-flex;align-items:center;gap:var(--space-2);background:var(--color-bg-page);border:1px solid var(--color-border);border-radius:var(--radius-full);padding:6px 14px;font-size:var(--text-sm);color:var(--color-text-secondary);font-family:var(--font-mono);letter-spacing:.04em}
  .badge-room .dot{font-family:var(--font-primary)}
  .badge-room .accent{color:var(--color-coral)}
  .head-spacer{flex:1}
  .sm-tag{display:inline-flex;align-items:center;gap:var(--space-2);font-weight:var(--fw-medium);color:var(--color-text-primary);font-size:var(--text-base)}
  .sm-tag .em{font-size:18px}

  /* Phase pill */
  .phase-pill{
    display:inline-flex;align-items:center;gap:var(--space-2);
    border-radius:var(--radius-full);padding:5px 14px;font-size:var(--text-sm);font-weight:var(--fw-medium);
    transition:background .35s ease, color .35s ease, border-color .35s ease;
    background:var(--color-bg-page);color:var(--color-text-muted);border:1px solid var(--color-border);
  }
  .phase-pill .pulse{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;animation:pulseDot 1.6s ease-out infinite}
  @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(255,180,80,.4)}100%{box-shadow:0 0 0 14px rgba(255,180,80,0)}}

  /* ── Story panel ── */
  .story{
    background:var(--color-bg-page);
    border-radius:var(--radius-lg);
    padding:var(--space-4) var(--space-5);
    border:1px solid var(--color-border);
    transition:background .3s ease, border-color .3s ease;
  }
  .story .label{font-size:var(--text-xs);letter-spacing:.10em;text-transform:uppercase;color:var(--color-text-secondary);font-weight:var(--fw-medium);margin-bottom:6px;font-family:var(--font-primary)}
  .story .title{font-size:22px;font-weight:var(--fw-bold);color:var(--color-text-primary);min-height:32px;letter-spacing:-.01em;line-height:1.2;position:relative;font-family:var(--font-primary)}
  .story .title::after{content:'';display:inline-block;width:2px;height:1em;margin-left:2px;background:var(--color-brand-primary);vertical-align:-3px;animation:caret 0.9s steps(1) infinite;opacity:0}
  .story.is-typing .title::after{opacity:1}
  @keyframes caret{50%{opacity:0}}

  /* ── Stage area : empile cards et scoreboard sur la même rangée grid ── */
  .stage-area{position:relative;display:grid;align-items:stretch;min-height:0}
  .stage-area > *{grid-column:1;grid-row:1;min-height:0}

  /* ── Players row ── */
  .players{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:var(--space-3);
    align-items:end;
    transition:opacity .4s ease, transform .4s ease;
  }
  .scene.is-debate .players{opacity:0;transform:translateY(-6px);pointer-events:none}

  .seat{
    position:relative;
    background:var(--color-bg-page);
    border:1.5px solid var(--color-border);
    border-radius:var(--radius-lg);
    padding:14px 8px 16px;
    text-align:center;
    height:150px;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    transform:translateY(20px) scale(.96);
    opacity:0;
    transition:opacity .45s ease, transform .45s cubic-bezier(.2,.7,.2,1.2), border-color .35s ease, background .35s ease;
  }
  .seat.is-joined{opacity:1;transform:translateY(0) scale(1)}
  .seat.is-hot{border-color:var(--color-coral);background:var(--color-coral-50)}
  .seat.is-aligned{border-color:var(--color-teal-600);background:var(--color-teal-50)}
  .seat .who{display:flex;align-items:center;gap:6px;font-size:var(--text-base);color:var(--color-text-primary);font-weight:var(--fw-medium);font-family:var(--font-primary)}
  .seat .emoji{font-size:18px;line-height:1}

  /* Card */
  .card{
    margin-top:auto;
    width:58px;height:80px;
    border-radius:var(--radius-lg);
    background:var(--color-bg-surface);
    border:1.5px solid var(--color-border);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-sm);
    font-weight:var(--fw-bold);font-size:26px;color:var(--color-brand-primary);
    position:relative;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.7,.2,1.2), box-shadow .35s, background .35s, color .35s, border-color .35s;
  }
  .card .face,.card .back{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;border-radius:inherit;overflow:hidden;
  }
  .card .face{color:var(--color-brand-primary);font-family:var(--font-primary)}
  /* Dos = logo mark Scrumbler (carte tiltée -8° + ?). Cf. BRAND.md §1. */
  .card .back{transform:rotateY(180deg);padding:5px;background:var(--color-bg-surface)}
  .card .back svg{width:100%;height:100%;display:block}
  .card.is-hidden{transform:rotateY(180deg)}
  .card.is-pending{opacity:.55}
  .card.is-outlier{box-shadow:0 0 0 3px var(--color-coral), 0 8px 20px rgba(255,127,102,.35)}
  .card.is-aligned-c{box-shadow:0 0 0 3px var(--color-teal-600), 0 8px 20px rgba(63,184,196,.32)}

  /* Vote ripple */
  .seat .ripple{position:absolute;left:50%;bottom:50px;width:8px;height:8px;border-radius:50%;background:var(--color-teal-600);opacity:0;transform:translateX(-50%)}
  .seat.is-voted .ripple{animation:ripple 1.2s ease-out 1}
  @keyframes ripple{0%{opacity:.7;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-10px) scale(4)}}

  /* ── Scoreboard naïf (phase débat) ───────────────────────────────────────
     Reprend le pattern de src/components/room/RevealDashboard.tsx :
       - axe Fibonacci à gauche
       - barres verticales gradient par tier (cool/mid/warm/hot)
       - ligne de moyenne pointillée + marker "M"
       - value pill et tier badge au-dessus de chaque barre
     Voir DESIGN_SYSTEM.md "Reveal scoreboard" et tokens.css --gradient-fill-*. */
  .scoreboard-mini{
    align-self:stretch;
    display:grid;
    grid-template-columns:42px 1fr;
    gap:var(--space-3);
    padding:var(--space-4) var(--space-4) var(--space-3);
    background:linear-gradient(180deg, var(--color-bg-page) 0%, var(--color-bg-surface) 100%);
    border:1px solid var(--color-border);
    border-radius:var(--radius-xl);
    opacity:0;
    transform:translateY(8px) scale(.985);
    transition:opacity .4s ease, transform .4s cubic-bezier(.2,.7,.2,1.2);
    pointer-events:none;
    min-height:0;
  }
  .scene.is-debate .scoreboard-mini{opacity:1;transform:translateY(0) scale(1)}

  /* L'axe et le plot partagent une "zone utile" identique pour aligner ticks
     et barres au pixel près. On réserve : 24px en haut (value pill flottante)
     et 38px en bas (label nom du voteur). */
  .sb-axis{position:relative}
  .sb-axis::after{
    content:'';position:absolute;right:0;top:24px;bottom:38px;
    border-right:1px dashed var(--color-border);
  }
  .sb-tick{
    position:absolute;right:8px;
    /* var(--p) ∈ [0,1] = position relative dans la zone utile */
    bottom:calc(38px + var(--p) * (100% - 62px));
    transform:translateY(50%);
    font-size:var(--text-xs);font-weight:var(--fw-medium);
    color:var(--color-text-muted);font-family:var(--font-primary);
    line-height:1;letter-spacing:0;
  }

  .sb-plot{
    position:relative;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:var(--space-2);
    align-items:end;
    padding:24px 0 38px;
    min-height:220px;
  }

  /* Mean line — même vocabulaire que .reveal-chart__mean-line */
  .sb-mean{
    position:absolute;left:0;right:0;height:0;
    bottom:calc(38px + var(--p) * (100% - 62px));
    border-top:2px dashed var(--color-brand-primary);
    pointer-events:none;
    opacity:0;
    transition:opacity .4s ease .25s;
    z-index:2;
  }
  .scene.is-debate .sb-mean{opacity:1}
  .sb-mean__marker{
    position:absolute;left:-12px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;
    background:var(--color-brand-primary);color:#fff;
    font-size:11px;font-weight:var(--fw-bold);font-family:var(--font-primary);
    border-radius:var(--radius-full);
    box-shadow:0 2px 8px rgba(73,112,255,0.35);
  }

  .sb-bar{
    position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    height:100%;
  }
  .sb-bar__col{
    position:relative;width:62%;max-width:64px;height:0;
    border-radius:14px 14px 4px 4px;
    box-shadow:0 4px 12px rgba(40,48,80,0.10), inset 0 -4px 0 rgba(0,0,0,0.08);
    transition:height .75s cubic-bezier(.2,.7,.2,1.2), box-shadow .35s ease, background .5s ease;
    overflow:hidden;
  }
  .sb-bar__col::before{
    content:'';position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0) 40%);
    pointer-events:none;
  }
  /* Gradients tiers — identiques à tokens.css --gradient-fill-* */
  .sb-bar__col[data-tier="easy"]   {background:var(--gradient-fill-cool)}
  .sb-bar__col[data-tier="medium"] {background:var(--gradient-fill-mid)}
  .sb-bar__col[data-tier="hard"]   {background:var(--gradient-fill-warm)}
  .sb-bar__col[data-tier="epic"]   {background:var(--gradient-fill-hot)}

  .sb-bar.is-outlier .sb-bar__col{box-shadow:0 4px 12px rgba(40,48,80,0.10), inset 0 -4px 0 rgba(0,0,0,0.08), 0 0 0 3px rgba(255,127,102,0.55)}
  .sb-bar.is-aligned .sb-bar__col{box-shadow:0 4px 12px rgba(40,48,80,0.10), inset 0 -4px 0 rgba(0,0,0,0.08), 0 0 0 3px rgba(63,184,196,0.55)}

  /* Token flottant au-dessus de chaque barre, comme .reveal-bar__token */
  .sb-bar__token{
    position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(100% - 8px);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    pointer-events:none;
    opacity:0;
    transition:opacity .35s ease;
  }
  .scene.is-debate .sb-bar__token{opacity:1;transition-delay:.35s}
  .sb-bar__value{
    background:var(--color-bg-surface);color:var(--color-text-primary);
    font-family:var(--font-primary);font-weight:var(--fw-bold);font-size:var(--text-lg);
    padding:2px 11px;border-radius:var(--radius-full);
    border:2px solid var(--color-bg-surface);
    box-shadow:0 3px 10px rgba(40,48,80,0.18);
    line-height:1.2;letter-spacing:-.01em;
  }
  .sb-bar__tier{
    font-size:10px;font-family:var(--font-primary);font-weight:var(--fw-bold);
    letter-spacing:.08em;text-transform:uppercase;color:#fff;
    padding:1px 8px;border-radius:var(--radius-full);
  }
  .sb-bar__tier[data-tier="easy"]   {background:var(--color-success-dark)}
  .sb-bar__tier[data-tier="medium"] {background:var(--color-brand-primary)}
  .sb-bar__tier[data-tier="hard"]   {background:var(--color-warning-dark)}
  .sb-bar__tier[data-tier="epic"]   {background:var(--color-danger-dark)}

  /* Le nom du voteur vit dans le padding-bottom du plot (38px réservés),
     juste sous la barre, pour ne pas être recouvert par le dégradé. */
  .sb-bar__name{
    position:absolute;left:0;right:0;bottom:-28px;text-align:center;
    font-size:var(--text-xs);font-weight:var(--fw-medium);color:var(--color-text-secondary);
    font-family:var(--font-primary);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    z-index:3;
  }

  /* ── Footer stats ── */
  .stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:var(--space-6);
    padding-top:var(--space-4);
    border-top:1px solid var(--color-border);
    align-items:end;
  }
  .stat{text-align:center;opacity:0;transform:translateY(8px);transition:opacity .4s ease, transform .4s ease}
  .stats.is-shown .stat{opacity:1;transform:translateY(0)}
  .stat .l{font-size:var(--text-xs);letter-spacing:.10em;text-transform:uppercase;color:var(--color-text-secondary);font-weight:var(--fw-medium);font-family:var(--font-primary)}
  .stat .v{font-size:34px;font-weight:var(--fw-bold);color:var(--color-text-primary);margin-top:6px;letter-spacing:-.02em;font-family:var(--font-primary)}
  .stat .v.brand{color:var(--color-brand-primary)}
  .stat .tier{display:inline-block;margin-top:6px;font-size:22px;letter-spacing:.04em;font-weight:var(--fw-bold);color:var(--color-text-primary);font-family:var(--font-primary)}

  /* ── Confetti (à la révélation du consensus) ── */
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit}
  .confetti i{
    position:absolute;top:50%;left:50%;width:8px;height:12px;border-radius:2px;
    opacity:0;transform:translate(-50%,-50%);
  }
  .stats.is-burst ~ .confetti i,
  .scene.is-consensus .confetti i{animation:confetti 1.6s cubic-bezier(.2,.6,.2,1) forwards}
  @keyframes confetti{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(0)}
    20%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--r))}
  }

  /* Phase chip transitions */
  .scene.is-voting .phase-pill{background:var(--color-amber-50);color:var(--color-warning-dark);border-color:var(--color-amber-50)}
  .scene.is-revealed .phase-pill,
  .scene.is-debate .phase-pill,
  .scene.is-consensus .phase-pill{background:var(--color-teal-50);color:var(--color-success-dark);border-color:var(--color-teal-50)}
  .scene.is-onboarding .phase-pill{background:var(--color-bg-page);color:var(--color-text-muted);border-color:var(--color-border)}

  /* Caption sous la scène */
  .caption{
    position:absolute;left:50%;bottom:-58px;transform:translateX(-50%);
    font-size:var(--text-base);color:var(--color-text-secondary);letter-spacing:.02em;
    background:rgba(255,255,255,.85);padding:6px 14px;border-radius:var(--radius-full);border:1px solid var(--color-border);
    backdrop-filter:blur(8px);
    opacity:0;transition:opacity .3s ease, transform .3s ease;
    font-family:var(--font-primary);
  }
  .caption.is-on{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .caption .em{margin-right:6px}

  /* Progress bar */
  .progress{position:absolute;left:0;right:0;bottom:0;height:3px;background:transparent}
  .progress .bar{height:100%;background:linear-gradient(90deg, var(--color-brand-primary), var(--color-violet), var(--color-teal-600));width:0%;transition:width .25s linear}

  /* Coach bubble */
  .coach{
    position:absolute;left:24px;top:74px;
    background:var(--color-brand-primary);color:#fff;border-radius:var(--radius-full);
    padding:8px 14px;font-size:var(--text-sm);font-weight:var(--fw-medium);box-shadow:var(--shadow-primary-btn);
    transform:translateY(-8px) scale(.92);opacity:0;
    transition:opacity .35s ease, transform .35s cubic-bezier(.2,.7,.2,1.4);
    font-family:var(--font-primary);
    z-index:5;
  }
  .coach.is-on{opacity:1;transform:translateY(0) scale(1)}
  .coach::after{content:'';position:absolute;left:24px;bottom:-6px;width:12px;height:12px;background:var(--color-brand-primary);transform:rotate(45deg)}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important}
  }
</style>
</head>
<body>
<div class="stage" aria-label="Démo Scrumbler en boucle">

  <!-- Décor de fond, mêmes blobs que la lobby et la hero (cf. globals.css .deco-blob) -->
  <div class="deco" style="width:340px;height:280px;background:var(--color-teal);top:-60px;right:-80px"></div>
  <div class="deco" style="width:240px;height:200px;background:var(--color-violet);bottom:40px;left:-60px"></div>
  <div class="deco-ring" style="width:140px;height:140px;color:var(--color-amber);bottom:120px;right:60px"></div>
  <div class="deco-ring" style="width:80px;height:80px;color:var(--color-sky);top:80px;left:80px"></div>

  <div class="scene is-onboarding" id="scene">

    <div class="coach" id="coach">Allez, on lance le vote ✨</div>

    <div class="scene-head">
      <div class="badge-room">
        <span class="dot">🃏</span>
        <span>scrumbler.app/room/<span class="accent">abc-123</span></span>
      </div>
      <span class="phase-pill" id="phasePill"><span class="pulse"></span><span id="phaseLabel">En attente</span></span>
      <div class="head-spacer"></div>
      <span class="sm-tag"><span class="em">🎯</span> Scrum Master</span>
    </div>

    <div class="story" id="story">
      <div class="label">Story</div>
      <div class="title" id="storyTitle"></div>
    </div>

    <div class="stage-area">
      <div class="players" id="players"></div>

      <!-- Scoreboard naïf, visible pendant la phase débat -->
      <div class="scoreboard-mini" id="scoreboard" aria-hidden="true">
        <div class="sb-axis" id="sbAxis"></div>
        <div class="sb-plot" id="sbPlot">
          <div class="sb-mean" id="sbMean">
            <span class="sb-mean__marker" title="Moyenne 7.8">M</span>
          </div>
        </div>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="l">Médiane</div><div class="v">8</div></div>
      <div class="stat"><div class="l">Consensus</div><div class="v brand" id="consensusVal">78<small style="font-size:18px">%</small></div></div>
      <div class="stat"><div class="l">Tier</div><div class="tier">HARD</div></div>
    </div>

    <div class="confetti" id="confetti"></div>

    <div class="caption" id="caption"><span class="em">👋</span><span id="captionText">L'équipe arrive…</span></div>

    <div class="progress"><div class="bar" id="bar"></div></div>
  </div>
</div>

<script>
(() => {
  // ── Casting (5 voteurs) ──────────────────────────────────────────────────
  const cast = [
    { name:'Lina', emoji:'🦊' },
    { name:'Tom',  emoji:'🐼' },
    { name:'Sam',  emoji:'🦉' },
    { name:'Pol',  emoji:'🦊' },
    { name:'Jin',  emoji:'🐙' },
  ];

  // Suite Fibonacci active (cf. src/lib/game/scales.ts).
  const FIBO = [1, 2, 3, 5, 8, 13, 21];

  // Votes du round : sur cette échelle,
  //   5  → idx 3, tier MEDIUM (gradient-fill-mid)  → outlier (sous la médiane 8)
  //   8  → idx 4, tier HARD   (gradient-fill-warm) → aligned (médiane + modale)
  //   13 → idx 5, tier EPIC   (gradient-fill-hot)  → outlier (au-dessus)
  // Médiane = 8, moyenne = 7.8, consensus = 78%.
  const votes = [
    { v:'5',  tier:'medium', aligned:false },
    { v:'8',  tier:'hard',   aligned:true  },
    { v:'5',  tier:'medium', aligned:false },
    { v:'8',  tier:'hard',   aligned:true  },
    { v:'13', tier:'epic',   aligned:false },
  ];

  // Logo mark inline — source : public/brand/logo/logo-mark.svg.
  // Sert de dos de carte (carte tiltée -8° avec ? brand, comme dans BRAND.md §1).
  const LOGO_MARK_SVG = `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <g transform="rotate(-8 50 50)">
        <rect x="22" y="14" width="56" height="72" rx="10" fill="#4970ff"></rect>
        <rect x="25.5" y="17.5" width="49" height="65" rx="6.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.18"></rect>
        <text x="50" y="65" font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.02em">?</text>
        <text x="29.5" y="27" font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" fill="#ffffff" opacity="0.85">?</text>
        <text x="70.5" y="79" font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" fill="#ffffff" opacity="0.85" text-anchor="end">?</text>
      </g>
    </svg>`;

  // ── DOM
  const scene = document.getElementById('scene');
  const playersEl = document.getElementById('players');
  const storyTitleEl = document.getElementById('storyTitle');
  const storyEl = document.getElementById('story');
  const statsEl = document.getElementById('stats');
  const phaseLabelEl = document.getElementById('phaseLabel');
  const captionEl = document.getElementById('caption');
  const captionText = document.getElementById('captionText');
  const captionEm = captionEl.querySelector('.em');
  const coach = document.getElementById('coach');
  const bar = document.getElementById('bar');
  const confetti = document.getElementById('confetti');
  const sbAxis = document.getElementById('sbAxis');
  const sbPlot = document.getElementById('sbPlot');
  const sbMean = document.getElementById('sbMean');

  // ── Seats + cartes (dos = logo mark)
  cast.forEach((p, i) => {
    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.dataset.idx = i;
    seat.innerHTML = `
      <div class="who"><span class="emoji">${p.emoji}</span><span>${p.name}</span></div>
      <span class="ripple"></span>
      <div class="card is-hidden is-pending" data-card>
        <div class="face">${votes[i].v}</div>
        <div class="back">${LOGO_MARK_SVG}</div>
      </div>
    `;
    playersEl.appendChild(seat);
  });

  // ── Scoreboard : axe Fibonacci. Chaque tick a un --p ∈ [0,1] qui le place
  //    dans la zone utile (cf. CSS .sb-tick calc). Même calcul pour la
  //    hauteur des barres et la position de la mean line → tout reste aligné.
  FIBO.forEach((n, idx) => {
    const t = document.createElement('span');
    t.className = 'sb-tick';
    t.textContent = String(n);
    t.style.setProperty('--p', String((idx + 1) / FIBO.length));
    sbAxis.appendChild(t);
  });

  function heightForValue(v) {
    const idx = FIBO.indexOf(Number(v));
    if (idx < 0) return 14;
    return ((idx + 1) / FIBO.length) * 100;
  }

  // Mean line : interpolation linéaire entre les ticks Fibonacci encadrants
  // (même formule que reveal-chart__mean-line dans RevealDashboard).
  (function placeMeanLine() {
    const mean = (5 + 5 + 8 + 8 + 13) / 5;
    let lo = 0, hi = 1;
    for (let i = 0; i < FIBO.length - 1; i++) {
      if (FIBO[i] <= mean && mean <= FIBO[i + 1]) { lo = i; hi = i + 1; break; }
    }
    const t = (mean - FIBO[lo]) / (FIBO[hi] - FIBO[lo]);
    const p = ((lo + t) + 1) / FIBO.length;
    sbMean.style.setProperty('--p', String(p));
  })();

  // ── Barres du scoreboard (une par voteur)
  const sbBars = cast.map((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'sb-bar ' + (votes[i].aligned ? 'is-aligned' : 'is-outlier');
    wrap.dataset.idx = i;
    wrap.innerHTML = `
      <div class="sb-bar__col" data-tier="${votes[i].tier}"></div>
      <div class="sb-bar__token">
        <div class="sb-bar__value" data-val>${votes[i].v}</div>
        <div class="sb-bar__tier" data-tier="${votes[i].tier}" data-tier-label>${votes[i].tier.toUpperCase()}</div>
      </div>
      <div class="sb-bar__name">${p.emoji} ${p.name}</div>
    `;
    sbPlot.appendChild(wrap);
    return wrap;
  });

  // ── Confetti — palette brand secondaires (cf. tokens.css)
  const palette = ['#4970ff', '#ffb450', '#a8e0e5', '#ff7f66', '#9485f2', '#64c1fa'];
  for (let i = 0; i < 48; i++) {
    const c = document.createElement('i');
    const ang = Math.random() * Math.PI * 2;
    const dist = 220 + Math.random() * 180;
    c.style.setProperty('--dx', `${Math.cos(ang) * dist}px`);
    c.style.setProperty('--dy', `${Math.sin(ang) * dist * .9 - 60}px`);
    c.style.setProperty('--r', `${(Math.random() * 720 - 360)}deg`);
    c.style.background = palette[i % palette.length];
    c.style.animationDelay = `${Math.random() * .25}s`;
    confetti.appendChild(c);
  }

  // ── Helpers
  const seats = [...playersEl.querySelectorAll('.seat')];
  const cards = [...playersEl.querySelectorAll('[data-card]')];

  function setPhase(name, cls) {
    phaseLabelEl.textContent = name;
    scene.classList.remove('is-onboarding', 'is-voting', 'is-revealed', 'is-debate', 'is-consensus');
    scene.classList.add(cls);
  }
  function caption(emoji, text) {
    captionEl.classList.remove('is-on');
    setTimeout(() => {
      captionEm.textContent = emoji;
      captionText.textContent = text;
      captionEl.classList.add('is-on');
    }, 120);
  }
  function showCoach(text, ms = 1400) {
    coach.textContent = text;
    coach.classList.add('is-on');
    setTimeout(() => coach.classList.remove('is-on'), ms);
  }
  function reset() {
    seats.forEach(s => s.classList.remove('is-joined', 'is-voted', 'is-hot', 'is-aligned'));
    cards.forEach(c => {
      c.classList.add('is-hidden', 'is-pending');
      c.classList.remove('is-outlier', 'is-aligned-c');
      const face = c.querySelector('.face');
      // remettre les valeurs originales (les outliers ont été morphés en 8 à la fin du round)
      face.textContent = votes[Array.prototype.indexOf.call(cards, c)].v;
    });
    storyTitleEl.textContent = '';
    storyEl.classList.remove('is-typing');
    statsEl.classList.remove('is-shown', 'is-burst');
    // Reset des barres scoreboard
    sbBars.forEach((b, i) => {
      const col = b.querySelector('.sb-bar__col');
      col.style.height = '0%';
      col.dataset.tier = votes[i].tier;
      b.classList.remove('is-aligned', 'is-outlier');
      b.classList.add(votes[i].aligned ? 'is-aligned' : 'is-outlier');
      b.querySelector('[data-val]').textContent = votes[i].v;
      const tierEl = b.querySelector('[data-tier-label]');
      tierEl.textContent = votes[i].tier.toUpperCase();
      tierEl.dataset.tier = votes[i].tier;
    });
    confetti.querySelectorAll('i').forEach(c => { c.style.animation = 'none'; void c.offsetWidth; c.style.animation = ''; });
    setPhase('En attente', 'is-onboarding');
    caption('👋', "L'équipe arrive…");
  }

  const STORY = "Refactor du module d'authentification";
  function typeStory() {
    return new Promise(resolve => {
      storyEl.classList.add('is-typing');
      let i = 0;
      const tick = () => {
        storyTitleEl.textContent = STORY.slice(0, ++i);
        if (i < STORY.length) setTimeout(tick, 32 + Math.random() * 30);
        else { storyEl.classList.remove('is-typing'); resolve(); }
      };
      tick();
    });
  }
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ── Boucle de scènes (≈25 s)
  async function loop() {
    while (true) {
      reset();
      const total = 25000;
      const t0 = performance.now();
      const tickBar = () => {
        const e = performance.now() - t0;
        bar.style.width = Math.min(100, (e / total) * 100) + '%';
        if (e < total) requestAnimationFrame(tickBar);
      };
      requestAnimationFrame(tickBar);

      // 1) ONBOARDING
      caption('👋', "L'équipe rejoint la room");
      await wait(500);
      for (let i = 0; i < seats.length; i++) {
        seats[i].classList.add('is-joined');
        await wait(280);
      }
      await wait(500);

      // 2) STORY + VOTE en aveugle (cartes dos visible = logo mark)
      setPhase('Vote en cours', 'is-voting');
      caption('🎯', "Le Scrum Master pose la story");
      showCoach("J'écris la story…", 1600);
      await wait(250);
      await typeStory();
      await wait(300);

      caption('🃏', "Chacun pose sa carte, en aveugle");
      const order = [2, 0, 4, 1, 3];
      for (const idx of order) {
        seats[idx].classList.add('is-voted');
        const card = cards[idx];
        card.classList.remove('is-pending');
        card.animate(
          [{ transform: 'rotateY(180deg) translateY(0)' }, { transform: 'rotateY(180deg) translateY(-8px)' }, { transform: 'rotateY(180deg) translateY(0)' }],
          { duration: 380, easing: 'cubic-bezier(.2,.7,.2,1.2)' }
        );
        await wait(360);
      }
      await wait(400);

      // 3) REVEAL — flip orchestré
      showCoach("Révèle les cartes 🎉", 1500);
      caption('✨', "Reveal !");
      setPhase('Révélé', 'is-revealed');
      await wait(180);
      for (let i = 0; i < cards.length; i++) {
        const k = (i * 2) % cards.length;
        cards[k].classList.remove('is-hidden');
        await wait(120);
      }
      await wait(800);

      // 4) DÉBAT — scoreboard naïf : barres qui poussent par tier, mean line,
      //    rings coral (outliers) / teal (aligned) cohérents avec le DS.
      setPhase('Débat', 'is-debate');
      caption('💬', "On regarde la distribution, on débat des écarts");
      await wait(150);
      sbBars.forEach((b, i) => {
        setTimeout(() => {
          b.querySelector('.sb-bar__col').style.height = heightForValue(votes[i].v) + '%';
        }, 60 + i * 130);
      });
      showCoach("Lina ? Jin ? Vous justifiez ?", 2400);
      await wait(3400);

      // 5) CONSENSUS — outliers s'alignent sur 8 (HARD) :
      //    barres morphent + cartes morphent + stats + confetti.
      caption('🤝', "Consensus à 8, HARD");
      setPhase('Consensus', 'is-consensus');

      // Cartes : revenir au premier plan (les players fade-in via CSS) et
      // morpher les valeurs des outliers vers 8 avec un flip discret.
      cards.forEach((c, i) => c.classList.add(votes[i].aligned ? 'is-aligned-c' : 'is-outlier'));
      seats.forEach((s, i) => {
        if (votes[i].aligned) s.classList.add('is-aligned');
        else s.classList.add('is-hot');
      });
      await wait(250);

      const adjustIdx = [0, 2, 4]; // les outliers
      for (const idx of adjustIdx) {
        const card = cards[idx];
        const face = card.querySelector('.face');
        card.classList.remove('is-outlier');
        card.classList.add('is-aligned-c');
        seats[idx].classList.remove('is-hot');
        seats[idx].classList.add('is-aligned');
        card.animate(
          [{ transform: 'rotateY(0) scale(1)' }, { transform: 'rotateY(90deg) scale(.92)' }, { transform: 'rotateY(0) scale(1)' }],
          { duration: 480, easing: 'cubic-bezier(.2,.7,.2,1.2)' }
        );
        setTimeout(() => { face.textContent = '8'; }, 240);
        await wait(220);
      }

      // Stats + confetti
      statsEl.classList.add('is-shown', 'is-burst');
      confetti.querySelectorAll('i').forEach(c => {
        c.style.animation = 'none';
        void c.offsetWidth;
        c.style.animation = '';
      });
      await wait(2400);

      // 6) Outro
      caption('🔄', "Round suivant…");
      await wait(900);
    }
  }

  loop();
})();
</script>
</body>
</html>
